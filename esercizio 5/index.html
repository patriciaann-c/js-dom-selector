<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esercizio 5: Cambio tema Dark Mode</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f9;
            transition: background-color 0.3s, color 0.3s;
        }

        body.dark-mode {
            background-color: #222;
            color: #f4f4f9;
        }

        .exercise-container {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #3498db;
        }

        .exercise-container h2 {
            margin-top: 0;
            color: #2980b9;
            font-size: 1.2rem;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>

<body>
    <div class="exercise-container">
        <h2>5. Cambio tema (Dark Mode)</h2>
        <p>Aggiungi la classe .dark-mode al body quando clicchi sull'interruttore.</p>
        <button id="theme-switch">Attiva/DIsattiva Dark Mode</button>

        <script src="main.js"></script>
</body>

</html>
